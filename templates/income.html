<!DOCTYPE html>
<html>
<head>
    <title>Income History</title>

    <style>

    body{
        font-family:Arial;
        background:#f4f7fc;
        padding:30px;
    }

    .container{
        background:white;
        padding:25px;
        border-radius:15px;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    h1{
        color:#10b981;
        margin-bottom:20px;
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    th{
        background:#10b981;
        color:white;
    }

    th,td{
        padding:12px;
        border:1px solid #ddd;
        text-align:center;
    }

    .btn{
        display:inline-block;
        margin-bottom:20px;
        background:#2563eb;
        color:white;
        padding:10px 15px;
        text-decoration:none;
        border-radius:8px;
    }

    </style>

</head>

<body>

<a href="/dashboard" class="btn">
← Dashboard
</a>

<div class="container">

<h1>💵 Income History</h1>

<table>

<tr>
<th>ID</th>
<th>Source</th>
<th>Amount</th>
</tr>

{% for income in incomes %}

<tr>
<td>{{ income[0] }}</td>
<td>{{ income[1] }}</td>
<td>₹{{ income[2] }}</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
